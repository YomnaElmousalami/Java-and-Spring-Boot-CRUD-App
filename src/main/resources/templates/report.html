<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>Burnout Report</title>
  </head>
  <body>
    <div>
        <h1>Your Burnout Report</h1>

        <div class="score-circle"
             th:classappend="${score >= 70} ? 'score-high' : (${score >= 40} ? 'score-medium' : 'score-low')"
             th:text="${score}">0</div>

        <div class="score-bar-container">
            <div class="score-bar"
                 th:style="'width: ' + ${score} + '%; background: ' + ${scoreColor}"></div>
        </div>
        <p class="risk-label" th:text="${riskLevel}">Risk Level</p>

        <h2>AI Recommendations</h2>
        <p class="recommendations" th:text="${recommendations}">No recommendations yet.</p>

        <div class="nav-links">
            <a href="/dashboard">Back to Dashboard</a>
            <form class="logout-form" th:action="@{/logout}" method="post">
                <button class="logout-btn" type="submit">Sign Out</button>
            </form>
        </div>
    </div>
  </body>
</html>
