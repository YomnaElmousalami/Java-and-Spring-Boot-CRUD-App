<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>Dashboard</title>
  </head>
  <body>
    <div>
        <h1>Your Calendar Summary</h1>
        <p>Meetings (last 2 weeks): <strong th:text="${summary.totalMeetings}">0</strong></p>
        <p>Hours in meetings: <strong th:text="${summary.totalHours}">0</strong>h</p>
        <p>Earliest meeting: <strong th:text="${summary.earliestMeeting}">-</strong></p>
        <p>Latest meeting: <strong th:text="${summary.latestMeeting}">-</strong></p>
        <p>Weekend meetings: <strong th:text="${summary.weekendMeetings}">0</strong></p>
        <p>Back-to-back meetings: <strong th:text="${summary.backToBackMeetings}">0</strong></p>
        <p>Late night meetings (after 7pm): <strong th:text="${summary.lateNightMeetings}">0</strong></p>
        <p>Days with no 30-min break: <strong th:text="${summary.noBreakDays}">0</strong></p>

        <div class="nav-links">
            <a href="/report" id="analyze-btn">Analyze My Burnout Risk</a>
            <form class="logout-form" th:action="@{/logout}" method="post">
                <button class="logout-btn" type="submit">Sign Out</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('analyze-btn').addEventListener('click', function() {
            document.getElementById('loading-overlay').style.display = 'flex';
        });
    </script>
  </body>
</html>
